<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="void" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0b1224"/>
      <stop offset="0.45" stop-color="#121a3a"/>
      <stop offset="1" stop-color="#061018"/>
    </linearGradient>
    <linearGradient id="plasma" x1="80" y1="80" x2="420" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2ee6a6"/>
      <stop offset="0.55" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="gold" x1="280" y1="120" x2="420" y2="380" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f5d76e"/>
      <stop offset="1" stop-color="#f0b429"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="12" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Outer tile -->
  <rect width="512" height="512" rx="118" fill="url(#void)"/>
  <rect x="18" y="18" width="476" height="476" rx="104" stroke="url(#plasma)" stroke-width="3" opacity="0.55"/>
  <!-- Orbit ring -->
  <circle cx="256" cy="256" r="168" stroke="url(#plasma)" stroke-width="2" opacity="0.25" stroke-dasharray="8 14"/>
  <!-- Core B mark -->
  <g filter="url(#glow)">
    <path d="M168 148h118c42 0 76 28 76 68 0 28-16 50-42 60 34 12 54 38 54 72 0 48-40 80-88 80H168V148z" fill="url(#plasma)"/>
    <path d="M216 196v48h62c14 0 26-10 26-24s-12-24-26-24H216z" fill="#0a1020" opacity="0.9"/>
    <path d="M216 292v52h72c16 0 30-12 30-28s-14-24-30-24H216z" fill="#0a1020" opacity="0.75"/>
  </g>
  <!-- Arrow of pay -->
  <path d="M318 372l52-42-52-42" stroke="url(#gold)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M370 330H210" stroke="url(#gold)" stroke-width="18" stroke-linecap="round"/>
  <!-- Stars -->
  <circle cx="392" cy="128" r="4" fill="#f5d76e" opacity="0.9"/>
  <circle cx="108" cy="360" r="3" fill="#22d3ee" opacity="0.8"/>
  <circle cx="420" cy="280" r="2.5" fill="#fff" opacity="0.5"/>
</svg>
