  <text x="76" y="55" font-family="system-ui, -apple-system, sans-serif" font-size="44" font-weight="800" letter-spacing="-1" fill="#f1f5f9">Brad</text>
  <text x="160" y="55" font-family="system-ui, -apple-system, sans-serif" font-size="44" font-weight="800" letter-spacing="-1" fill="#3b82f6">Pay</text>

