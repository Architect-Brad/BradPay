  <path d="M24 22h10c4.4 0 8 3.1 8 7s-3.6 7-8 7H24V22z" fill="white" opacity="0.9"/>
  <path d="M24 36h12c4.4 0 8 3.1 8 7s-3.6 7-8 7H24V36z" fill="white" opacity="0.6"/>
